name: Build (Windows)

on:
  push:
    paths:
      - 'source/nlm.ispc'
      - 'source/vsnlm.cpp'
      - '.github/workflows/windows.yml'
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        type: string
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download VapourSynth headers
      run: |
        curl -s -o vs.zip -L https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R57.zip
        unzip -q vs.zip
        mv vapoursynth-*/ vapoursynth/

    - name: Download ISPC
      run: |
        curl -s -o ispc.zip -LJO https://github.com/ispc/ispc/releases/download/v1.20.0/ispc-v1.20.0-windows.zip
        unzip -q ispc.zip
        mv ispc-*/ ispc/
        tree ispc

    - name: Configure
      shell: bash
      run: cmake -S . -B build -G Ninja
        -D VS_INCLUDE_DIR="$(pwd)\vapoursynth\include"
        -D CMAKE_BUILD_TYPE=Release
        -D CMAKE_CXX_COMPILER="clang++"
        -D CMAKE_CXX_FLAGS="-Wall"
        -D CMAKE_ISPC_COMPILER="$(pwd)/ispc/bin/ispc.exe"
        -D CMAKE_ISPC_FLAGS="--opt=fast-math"
        -D CMAKE_ISPC_INSTRUCTION_SETS="sse2-i32x4;avx1-i32x4;avx2-i32x8"
        -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

    - name: Build
      run: cmake --build build --verbose

    - name: Install
      run: cmake --install build --prefix install

    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: nlm-ispc-Windows-x64
        path: install/bin/*.dll

    - name: Compress artifact for release
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      run: |
        cd artifact
        7z a -t7z -mx=7 ../vs-nlm-ispc-windows-x64.${{ inputs.tag }}.7z .

    - name: Upload release assets
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      uses: actions/upload-artifact@v7
      with:
        name: release-assets
        path: |
          vs-nlm-ispc-windows-x64.${{ inputs.tag }}.7z

  build-wheel:
    name: Package Wheel (Windows)
    needs: build-windows
    uses: ./.github/workflows/wheel.yml
    with:
      os: windows-2022
      artifact_name: nlm-ispc-Windows-x64
      artifact_path: install/bin
      build_sdist: false
